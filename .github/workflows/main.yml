name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: Run Lint
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-and-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Backend Image
      run: docker build -t yt-backend:${{ github.sha }} backend/
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'yt-backend:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  deploy-kind:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Create KIND cluster
      uses: helm/kind-action@v1.10.0
    - name: Deploy to KIND
      run: |
        kubectl apply -f k8s-simple/namespace.yaml
        kubectl apply -f k8s-simple/configmap.yaml
        kubectl apply -f k8s-simple/secret.yaml
        kubectl get pods -n yt-platform
