apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: yt-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: yt-backend:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: yt-config
        - secretRef:
            name: yt-secret
