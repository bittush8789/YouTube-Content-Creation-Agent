apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: yt-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: yt-frontend:latest
        ports:
        - containerPort: 8501
        envFrom:
        - configMapRef:
            name: yt-config
